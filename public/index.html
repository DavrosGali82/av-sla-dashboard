<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AV Service Report — Grant Thornton</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--p:#1B0A4B;--p2:#2E1A6B;--p3:#3D2780;--blue:#2F7FD1;--blt:#E8F1FB;
      --ink:#1c1830;--grey:#6b6b78;--line:#e7e7ee;
      --good:#1F9D63;--warn:#E8A23D;--bad:#E04F5F;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#f5f6fa;color:var(--ink);}

/* ── header */
.hdr{background:var(--p);color:#fff;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.hdr-left .brand{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);font-weight:700;}
.hdr-left h1{font-size:20px;font-weight:800;margin-top:2px;}
.hdr-left .sub{font-size:12px;color:#c9c2e8;margin-top:2px;}
.hdr-right{display:flex;gap:8px;}
.btn-pdf{background:#fff;color:var(--p);border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;}
.btn-reload{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:600;font-size:12px;cursor:pointer;}
#monthPicker option{background:#2E1A6B;color:#fff;}

/* ── tabs */
.tabs{background:var(--p2);display:flex;overflow-x:auto;padding:0 20px;}
.tab{color:#c9c2e8;border:none;background:none;padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:.15s;}
.tab.active{color:#fff;border-bottom-color:var(--blue);}
.tab:hover{color:#fff;}

/* ── banner */
.banner{padding:10px 28px;font-size:13px;}
.banner.sample{background:#FFF6E5;border-bottom:1px solid #F2D89A;color:#8a6400;}
.banner.live{background:#E8F7EE;border-bottom:1px solid #B7E2C7;color:#1a6b40;}
.banner.err{background:#FDECEC;border-bottom:1px solid #F3C0C0;color:#B03340;}

/* ── page layout */
.page{display:none;padding:24px 28px;max-width:1200px;margin:0 auto;}
.page.active{display:block;}
.section-title{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px;}
.section-sub{font-size:13px;color:var(--grey);margin-bottom:18px;}

/* ── cards */
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(27,10,75,.05);}
.card-title{font-size:13px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}

/* ── grids */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px;}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:14px;}
.gap{margin-top:18px;}

/* ── KPI tiles */
.kpi{border:1px solid var(--line);border-radius:12px;padding:16px;}
.kpi.click{cursor:pointer;transition:.15s;}
.kpi.click:hover{box-shadow:0 4px 12px rgba(27,10,75,.12);border-color:#b0a8d8;}
.kpi-lab{font-size:12px;color:var(--grey);font-weight:600;}
.kpi-val{font-size:32px;font-weight:800;margin-top:4px;}
.kpi-hint{font-size:10px;color:#bbb;margin-top:3px;}

/* ── SLA cards */
.sla-card{border-radius:12px;padding:16px;background:var(--blt);}
.sla-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sla-num{font-size:28px;font-weight:800;}
.sla-target{font-size:12px;color:var(--grey);}
.progress{height:8px;border-radius:99px;background:#fff;overflow:hidden;margin-top:8px;}
.progress i{display:block;height:100%;border-radius:99px;}

/* ── tags / pills */
.tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;display:inline-block;}

/* ── tables */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;text-transform:uppercase;font-size:11px;color:var(--grey);padding:8px 10px;background:var(--blt);}
td{padding:8px 10px;border-top:1px solid var(--line);vertical-align:top;}
tr:hover td{background:#fafafa;}

/* ── breach alert */
.breach-bar{display:flex;gap:10px;align-items:center;background:#FDECEC;border:1px solid #F3C0C0;color:#B03340;border-radius:10px;padding:12px 16px;font-weight:700;font-size:13px;}

/* ── office RAG bars */
.rag-bar{height:10px;border-radius:99px;background:#e8e8ee;overflow:hidden;margin-top:4px;}
.rag-bar i{display:block;height:100%;border-radius:99px;}

/* ── modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:900px;}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-size:16px;font-weight:700;}
.modal-body{padding:18px 22px;}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--grey);}

canvas{max-height:240px;}
@media print{
  .hdr-right,.tabs,.banner.noprint,.noprint{display:none!important;}
  .page{display:block!important;padding:0;}
  .card{break-inside:avoid;box-shadow:none;}
}
</style>
</head>
<body>

<header class="hdr noprint">
  <div class="hdr-left">
    <div class="brand">Technative · AV Service Platform</div>
    <h1 id="h-title">AV Service Report</h1>
    <div class="sub" id="h-sub">Loading…</div>
  </div>
  <div class="hdr-right">
    <select id="monthPicker" onchange="onMonthChange()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-weight:600;font-size:12px;cursor:pointer"></select>
    <button class="btn-reload" onclick="reload()">↺ Refresh</button>
    <button class="btn-pdf" onclick="window.print()">⤓ Download PDF</button>
  </div>
</header>

<nav class="tabs noprint" id="tabs"></nav>
<div id="banner"></div>
<div id="pages"></div>

<script>
const P="#1B0A4B",P2="#2E1A6B",P3="#3D2780",BLUE="#2F7FD1",GOOD="#1F9D63",WARN="#E8A23D",BAD="#E04F5F";
const FAULTS=["Room Down","Partial Fault","Routine"];
const FC={"Room Down":BAD,"Partial Fault":WARN,"Routine":BLUE};
const PALETTE=[P,P3,BLUE,"#9b8fd1","#5BA4E6","#c2b8e8","#7fa8d9","#b9d4ef"];
const charts={};
let R=null;

/* ── helpers */
const fmt=d=>d?new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"}):"—";
const fmtDT=d=>d?new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}):"—";
const el=(tag,cls,html="")=>{ const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };
const pill=(txt,col)=>`<span class="tag" style="background:${col}22;color:${col}">${txt}</span>`;
const ragCol=r=>r==="red"?BAD:r==="amber"?WARN:GOOD;

/* ── charts */
function mkChart(id,type,data,opts={}){
  const cv=document.getElementById(id); if(!cv)return;
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart(cv,{type,data,options:{responsive:true,plugins:{legend:{labels:{font:{size:11}}},...(opts.plugins||{})},scales:opts.scales||{},...(opts.extra||{})}});
}

/* ── modal */
function showModal(title,bodyHtml){
  document.getElementById("_m")?.remove();
  const bg=el("div","modal-bg"); bg.id="_m";
  bg.innerHTML=`<div class="modal"><div class="modal-head"><h3>${title}</h3><button class="close-btn" id="_mc">✕</button></div><div class="modal-body">${bodyHtml}</div></div>`;
  document.body.append(bg);
  bg.querySelector("#_mc").onclick=()=>bg.remove();
  bg.onclick=e=>{ if(e.target===bg)bg.remove(); };
}

/* ── case tables */
function sectionHead(txt){
  return `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);padding:10px 0 4px">${txt}</div>`;
}

function caseRows_open(cases){
  return cases.map(c=>{
    const ac=c.ageHours>48?BAD:c.ageHours>24?WARN:GOOD;
    return `<tr><td>${c.title}</td><td>${c.room}</td><td>${pill(c.fault,FC[c.fault]||BLUE)}</td><td>${c.office||"—"}</td><td>${fmt(c.created)}</td><td style="color:${ac};font-weight:700">${c.ageHours}h</td></tr>`;
  }).join("");
}

function openTable(cases){
  const sla=cases.filter(c=>!c.warranty);
  const war=cases.filter(c=>c.warranty);
  if(!cases.length) return "<p style='color:#999;padding:8px'>No open cases.</p>";
  const head=`<table><thead><tr><th>Title</th><th>Room</th><th>Fault</th><th>Office</th><th>Opened</th><th>Age</th></tr></thead><tbody>`;
  let html="";
  if(sla.length){ html+=sectionHead(`SLA cases (${sla.length})`)+head+caseRows_open(sla)+"</tbody></table>"; }
  if(war.length){ html+=sectionHead(`Warranty cases (${war.length}) — excluded from SLA`)+head+caseRows_open(war)+"</tbody></table>"; }
  return html||"<p style='color:#999;padding:8px'>No open cases.</p>";
}

function loggedTable(cases){
  const sla=cases.filter(c=>!c.warranty);
  const war=cases.filter(c=>c.warranty);
  if(!cases.length) return "<p style='color:#999;padding:8px'>None this month.</p>";
  const head=`<table><thead><tr><th>Title</th><th>Room</th><th>Fault</th><th>Status</th><th>Logged</th></tr></thead><tbody>`;
  const rows=cc=>cc.map(c=>`<tr><td>${c.title}</td><td>${c.room}</td><td>${pill(c.fault,FC[c.fault]||BLUE)}</td><td>${pill(c.status,c.status==="Closed"?GOOD:WARN)}</td><td>${fmtDT(c.created)}</td></tr>`).join("");
  let html="";
  if(sla.length){ html+=sectionHead(`SLA cases (${sla.length})`)+head+rows(sla)+"</tbody></table>"; }
  if(war.length){ html+=sectionHead(`Warranty cases (${war.length}) — excluded from SLA`)+head+rows(war)+"</tbody></table>"; }
  return html||"<p style='color:#999;padding:8px'>None this month.</p>";
}

function closedTable(cases){
  const sla=cases.filter(c=>!c.warranty);
  const war=cases.filter(c=>c.warranty);
  if(!cases.length) return "<p style='color:#999;padding:8px'>None this month.</p>";
  const head=`<table><thead><tr><th>Title</th><th>Room</th><th>Fault</th><th>Resolution</th><th>Closed</th></tr></thead><tbody>`;
  const rows=cc=>cc.map(c=>`<tr><td>${c.title}</td><td>${c.room}</td><td>${pill(c.fault,FC[c.fault]||BLUE)}</td><td>${c.resolution||"Not recorded"}</td><td>${fmtDT(c.closed)}</td></tr>`).join("");
  let html="";
  if(sla.length){ html+=sectionHead(`SLA cases (${sla.length})`)+head+rows(sla)+"</tbody></table>"; }
  if(war.length){ html+=sectionHead(`Warranty cases (${war.length}) — excluded from SLA`)+head+rows(war)+"</tbody></table>"; }
  return html||"<p style='color:#999;padding:8px'>None this month.</p>";
}

function warrantyTable(cases){
  if(!cases.length) return "<p style='color:#999;padding:8px'>No warranty cases this month.</p>";
  return `<table><thead><tr><th>Title</th><th>Room</th><th>Fault</th><th>Status</th><th>Logged</th></tr></thead><tbody>${cases.map(c=>`<tr><td>${c.title}</td><td>${c.room}</td><td>${pill(c.fault,FC[c.fault]||BLUE)}</td><td>${pill(c.status,c.status==="Closed"?GOOD:WARN)}</td><td>${fmtDT(c.created)}</td></tr>`).join("")}</tbody></table>`;
}

/* ── navigation */
const PAGES=[
  {id:"summary",  label:"📊 Summary"},
  {id:"sla",      label:"🎯 SLA Performance"},
  {id:"cases",    label:"🔧 Cases & Trends"},
  {id:"offices",  label:"🏢 Office Allocations"},
  {id:"hcv",      label:"✅ Health Checks"},
  {id:"improve",  label:"📈 Improvements"},
];

function initNav(){
  const nav=document.getElementById("tabs");
  const pg=document.getElementById("pages");
  PAGES.forEach((p,i)=>{
    const btn=el("button","tab"+(i===0?" active":""),p.label); btn.dataset.id=p.id;
    btn.onclick=()=>{ document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active")); btn.classList.add("active");
      document.querySelectorAll(".page").forEach(d=>d.classList.remove("active")); document.getElementById("pg-"+p.id).classList.add("active");
      setTimeout(()=>drawChartsForPage(p.id),50); };
    nav.append(btn);
    const div=el("div","page"+(i===0?" active":"")); div.id="pg-"+p.id;
    pg.append(div);
  });
}

/* ── fetch */
function onMonthChange(){
  const m=document.getElementById("monthPicker")?.value;
  reload(m);
}

async function reload(month){
  document.getElementById("h-sub").textContent="Loading…";
  const url = month ? `/api/report?month=${month}` : "/api/report";
  try{ const res=await fetch(url); R=await res.json(); }
  catch(e){ document.getElementById("h-sub").textContent="Could not reach server."; return; }
  const err=R.error?R:null; if(R.fallback)R=R.fallback;

  // Populate month picker on first load
  const picker=document.getElementById("monthPicker");
  if(picker && R.meta.monthsKeys && !picker.options.length){
    picker.innerHTML=R.meta.monthsKeys.map((k,i)=>
      `<option value="${k}" ${k===R.meta.reportingMonth?"selected":""}>${R.meta.monthsLabels[i]}</option>`
    ).join("");
  }

  setBanner(R,err);
  document.getElementById("h-title").textContent=`${R.meta.company} — AV Service Report`;
  document.getElementById("h-sub").textContent=`Reporting period: ${R.meta.reportingMonthLabel||""} · SLA ref: ${R.meta.slaRef}`;
  buildAllPages();
  drawChartsForPage("summary");
}

function setBanner(r,err){
  const b=document.getElementById("banner");
  if(err){ b.className="banner err noprint"; b.textContent=`Could not read live data: ${err.error}. Showing sample data.`; return; }
  if(r.meta.mode==="sample"){ b.className="banner sample noprint"; b.innerHTML="<b>Sample data.</b> Add <code>SC_API_TOKEN</code> in Render Environment to see live figures."; return; }
  b.className="banner live noprint";
  b.innerHTML=`<b>Live data.</b> Updated ${new Date(r.meta.generatedAt).toLocaleTimeString("en-GB")}.`;
}

/* ================================================================
   PAGE BUILDERS
   ================================================================ */

function buildAllPages(){
  buildSummary();
  buildSLA();
  buildCases();
  buildOffices();
  buildHCV();
  buildImprove();
}

/* ── 1. SUMMARY */
function buildSummary(){
  const pg=document.getElementById("pg-summary"); pg.innerHTML="";
  const k=R.kpis;

  // KPI row
  const kpiRow=el("div","gap"); kpiRow.style.cssText="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;";
  const kpiDefs=[
    {lab:`Logged (${R.meta.reportingMonthLabel||""})`,val:k.loggedThisMonth,click:()=>showModal(`Cases logged ${R.meta.reportingMonthLabel||""} (${k.loggedThisMonth})`,loggedTable(R.loggedThisMonthCases||[]))},
    {lab:`Closed (${R.meta.reportingMonthLabel||""})`,val:k.closedThisMonth,click:()=>showModal(`Cases closed ${R.meta.reportingMonthLabel||""} (${k.closedThisMonth})`,closedTable(R.closedThisMonthCases||[]))},
    {lab:"Open now",val:k.openNow,col:k.openNow?WARN:GOOD,click:()=>showModal(`Open cases (${k.openNow})`,openTable(R.openCases||[]))},
    {lab:"SLA breaches (open)",val:k.roomDownBreaches,col:k.roomDownBreaches?BAD:GOOD},
    {lab:`Warranty (${R.meta.reportingMonthLabel||""})`,val:R.warrantyThisMonth||0,col:"#8a8a8a",click:()=>showModal(`Warranty cases ${R.meta.reportingMonthLabel||""} (${R.warrantyThisMonth||0})`,warrantyTable(R.warrantyThisMonthCases||[]))},
  ];
  kpiDefs.forEach(d=>{
    const t=el("div","kpi"+(d.click?" click":""));
    t.innerHTML=`<div class="kpi-lab">${d.lab}</div><div class="kpi-val"${d.col?` style="color:${d.col}"`:""}>${d.val}</div>${d.click?'<div class="kpi-hint">Click to see cases</div>':""}`;
    if(d.click) t.onclick=d.click;
    kpiRow.append(t);
  });
  pg.append(kpiRow);

  if(k.roomDownBreaches>0){
    const b=el("div","breach-bar gap");
    b.textContent=`⚠ ${k.roomDownBreaches} Room Down case(s) have exceeded the ${R.targets["Room Down"]}h SLA target — immediate attention required.`;
    pg.append(b);
  }

  // Charts row: logged/closed trend + open by category
  const charts1=el("div","g21 gap");

  const c1=el("div","card"); c1.innerHTML=`<div class="card-title">Cases logged vs closed — 6 months</div><canvas id="cTrend"></canvas>`;
  const c2=el("div","card"); c2.innerHTML=`<div class="card-title">Open cases by fault category</div><canvas id="cOpenCat"></canvas>`;
  charts1.append(c1,c2); pg.append(charts1);

  // Second row: avg resolution trend
  const charts2=el("div","g2 gap");
  const c3=el("div","card"); c3.innerHTML=`<div class="card-title">Average resolution time per category (hrs) — 6 months</div><canvas id="cSlaTrend"></canvas>`;
  const c4=el("div","card");
  c4.innerHTML=`<div class="card-title">Cases by category this month</div>`;
  const catRows=FAULTS.map(f=>{
    const n=(R.loggedThisMonthCases||[]).filter(c=>c.fault===f).length;
    const pct=k.loggedThisMonth?Math.round(n/k.loggedThisMonth*100):0;
    return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${f}</span><b>${n}</b></div><div class="progress"><i style="width:${pct}%;background:${FC[f]}"></i></div></div>`;
  }).join("");
  c4.innerHTML+=catRows;
  charts2.append(c3,c4); pg.append(charts2);
}

/* ── 2. SLA */
function buildSLA(){
  const pg=document.getElementById("pg-sla"); pg.innerHTML="";

  // KPI reference box
  const ref=el("div","card gap");
  ref.innerHTML=`<div class="card-title">Confirmed SLA KPIs — TECHPR-0510</div>
  <div class="g3" style="margin-top:8px">
    <div><div style="font-size:12px;color:var(--grey)">Onsite response (Room Down)</div><div style="font-size:22px;font-weight:800">${R.targets["Room Down"]}h</div></div>
    <div><div style="font-size:12px;color:var(--grey)">Email response</div><div style="font-size:22px;font-weight:800">${R.responseTargets?.email||4}h</div></div>
    <div><div style="font-size:12px;color:var(--grey)">Telephone response</div><div style="font-size:22px;font-weight:800">${R.responseTargets?.telephone||1}h</div></div>
    <div><div style="font-size:12px;color:var(--grey)">HC report turnaround</div><div style="font-size:22px;font-weight:800">5 days</div></div>
    <div><div style="font-size:12px;color:var(--grey)">Call-outs total/yr (estate)</div><div style="font-size:22px;font-weight:800">${R.callOutAllocationTotal||29}</div></div>
    <div><div style="font-size:12px;color:var(--grey)">Partial Fault target</div><div style="font-size:22px;font-weight:800">${R.targets["Partial Fault"]}h</div></div>
  </div>`;
  pg.append(ref);

  // SLA performance cards
  const cards=el("div","g3 gap");
  (R.slaByCategory||[]).forEach(s=>{
    const col=s.within?GOOD:BAD, pct=Math.min(100,(s.avg/s.target)*100);
    const d=el("div","sla-card");
    d.innerHTML=`<div class="sla-top"><b>${s.fault}</b>${pill(s.within?"Within target":"Over target",col)}</div>
      <div class="sla-num">${s.avg}h</div>
      <div class="sla-target">Target: ${s.target}h · ${s.count} cases</div>
      <div class="progress"><i style="width:${pct}%;background:${col}"></i></div>`;
    cards.append(d);
  });
  pg.append(cards);

  // SLA trend chart
  const ct=el("div","card gap"); ct.innerHTML=`<div class="card-title">Average resolution time trend (hrs) — 6 months · dashed = SLA target</div><canvas id="cSlaFull"></canvas>`;
  pg.append(ct);

  // Breached cases table
  if((R.breachedCases||[]).length){
    const bt=el("div","card gap");
    bt.innerHTML=`<div class="card-title">Cases that exceeded SLA target (closed, most over-target first)</div>
    <table><thead><tr><th>Title</th><th>Room</th><th>Fault</th><th>Target</th><th>Actual</th><th>Over by</th><th>Closed</th></tr></thead>
    <tbody>${R.breachedCases.map(c=>`<tr><td>${c.title}</td><td>${c.room}</td><td>${pill(c.fault,FC[c.fault])}</td>
      <td>${c.target}h</td><td style="color:${BAD};font-weight:700">${c.hrs}h</td>
      <td style="color:${BAD};font-weight:700">+${c.over}h</td><td>${fmt(c.closed)}</td></tr>`).join("")}
    </tbody></table>`;
    pg.append(bt);
  }
}

/* ── 3. CASES */
function buildCases(){
  const pg=document.getElementById("pg-cases"); pg.innerHTML="";

  // Top rooms + resolution donut
  const r1=el("div","g2 gap");
  const cr=el("div","card"); cr.innerHTML=`<div class="card-title">Top rooms by closed cases (all time)</div><canvas id="cRooms"></canvas>`;
  const cd=el("div","card"); cd.innerHTML=`<div class="card-title">By resolution type</div><canvas id="cRes"></canvas>`;
  r1.append(cr,cd); pg.append(r1);

  // Room trend over 6 months
  const r2=el("div","card gap"); r2.innerHTML=`<div class="card-title">Top rooms — case volume trend (6 months)</div><canvas id="cRoomTrend"></canvas>`;
  pg.append(r2);

  // Resolution trend
  const r3=el("div","card gap"); r3.innerHTML=`<div class="card-title">Resolution type trend (6 months)</div><canvas id="cResTrend"></canvas>`;
  pg.append(r3);

  // Service call trend
  const r4=el("div","card gap"); r4.innerHTML=`<div class="card-title">Service calls per month</div><canvas id="cSC"></canvas>`;
  pg.append(r4);
}

/* ── 4. OFFICES */
function buildOffices(){

  const intro=el("div","card gap");
  intro.innerHTML=`<div class="card-title">Call-out allocation tracking — ${R.callOutAllocationTotal||29} call-outs per year across estate (SLA TECHPR-0510)</div>
  <div style="display:flex;gap:20px;font-size:13px;margin-top:8px">
    <span>${pill("On track",GOOD)} Used &lt;60%</span>
    <span>${pill("Monitor",WARN)} Used 60–90%</span>
    <span>${pill("Over / at risk",BAD)} Used &gt;90%</span>
  </div>`;
  pg.append(intro);

  // Table + bar chart
  const row=el("div","g21 gap");
  const tbl=el("div","card");

  <table><thead><tr><th>Office</th><th>Allocated</th><th>Used</th><th>Remaining</th><th>%</th><th>Status</th><th>Warranty</th></tr></thead>
  <tbody>${(R.officeAllocations||[]).map(o=>{
    const col=ragCol(o.rag);
    return `<tr><td><b>${o.office}</b><div class="rag-bar" style="width:120px"><i style="width:${Math.min(100,o.pct)}%;background:${col}"></i></div></td>

      <td style="color:${col};font-weight:700">${o.pct}%</td>

/* ── 5. HCV */
function hcvStatusCol(s){
  return s==="Completed"?GOOD:s==="Booked"?BLUE:s==="Overdue"?BAD:s==="In Progress"?BLUE:"#b0b0b0";
}

function buildHCV(){
  const pg=document.getElementById("pg-hcv"); pg.innerHTML="";
  const oh=R.officeHCV||{};
  const expected=oh.expected||(17*2);

  // ── KPI tiles
  const tiles=el("div","g4 gap");
  [
    {lab:"Expected this year",       val:expected,           col:P},
    {lab:"Completed",                val:oh.completed||0,    col:GOOD},
    {lab:"Booked (upcoming)",        val:oh.booked||0,       col:BLUE},
    {lab:"Overdue",                  val:oh.overdue||0,      col:oh.overdue?BAD:GOOD},
  ].forEach(d=>{
    const t=el("div","kpi");
    t.innerHTML=`<div class="kpi-lab">${d.lab}</div><div class="kpi-val" style="color:${d.col}">${d.val}</div>`;
    tiles.append(t);
  });
  pg.append(tiles);

  // ── Progress bar
  const prog=el("div","card gap");
  const compPct = expected ? ((oh.completed||0)/expected*100).toFixed(1) : 0;
  const bkdPct  = expected ? ((oh.booked||0)/expected*100).toFixed(1)    : 0;
  const ovdPct  = expected ? ((oh.overdue||0)/expected*100).toFixed(1)   : 0;
  prog.innerHTML=`<div class="card-title">Annual HCV schedule progress — ${oh.completed||0} of ${expected} visits completed</div>
    <div style="display:flex;align-items:center;gap:12px;margin-top:10px">
      <div style="flex:1;height:18px;border-radius:99px;background:#e8e8ee;overflow:hidden;display:flex">
        <div style="width:${compPct}%;background:${GOOD}" title="Completed"></div>
        <div style="width:${bkdPct}%;background:${BLUE}"  title="Booked"></div>
        <div style="width:${ovdPct}%;background:${BAD}"   title="Overdue"></div>
      </div>
      <span style="font-size:12px;white-space:nowrap;color:var(--grey)">${compPct}% done</span>
    </div>
    <div style="display:flex;gap:16px;margin-top:8px;font-size:12px">
      ${pill("Completed",GOOD)} ${oh.completed||0} &nbsp;
      ${pill("Booked",BLUE)} ${oh.booked||0} &nbsp;
      ${pill("Overdue",BAD)} ${oh.overdue||0} &nbsp;
      ${pill("Not scheduled","#b0b0b0")} ${oh.notScheduled||0}
    </div>`;
  pg.append(prog);

  // ── Per-office summary table
  const tbl=el("div","card gap");
  const rows=(oh.summary||[]).map(o=>{
    const v=(v)=>{
      if(!v||v.status==="Not scheduled")
        return `<td>${pill("Not scheduled","#b0b0b0")}</td><td style="color:#bbb">—</td>`;
      const col=hcvStatusCol(v.status);
      const date=v.status==="Completed"?fmt(v.completed):fmt(v.scheduled);
      const dateLabel=v.status==="Completed"?"Completed":"Scheduled";
      return `<td>${pill(v.status,col)}${v.outcome?` <span style="font-size:11px;color:var(--grey)">${v.outcome}</span>`:""}</td><td style="font-size:12px;color:var(--grey)">${dateLabel}: ${date}</td>`;
    };
    return `<tr><td><b>${o.office}</b></td>${v(o.visit1)}${v(o.visit2)}</tr>`;
  }).join("");

  tbl.innerHTML=`<div class="card-title">Per-office HCV status — Visit 1 &amp; Visit 2</div>
  <table>
    <thead><tr><th>Office</th><th>Visit 1 status</th><th>Visit 1 date</th><th>Visit 2 status</th><th>Visit 2 date</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
  pg.append(tbl);
}

/* ── 6. IMPROVEMENTS */
const SC_IMP={Open:WARN,"In Progress":BLUE,Completed:GOOD,"On Hold":"#8a8a8a"};
const PC_IMP={High:BAD,Medium:WARN,Low:BLUE};
let editingId=null;

function buildImprove(){
  const pg=document.getElementById("pg-improve"); pg.innerHTML="";

  // Add button
  const addBtn=el("div","gap");
  addBtn.innerHTML=`<button onclick="showImpForm(null)" style="background:var(--p);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer">+ Add action</button>
  <span style="font-size:12px;color:var(--grey);margin-left:10px">Changes save automatically · commit data/improvements.json to GitHub before redeploying to preserve edits</span>`;
  pg.append(addBtn);

  // Form (hidden by default)
  const formCard=el("div","card gap"); formCard.id="imp-form"; formCard.style.display="none";
  formCard.innerHTML=`<div class="card-title" id="imp-form-title">Add improvement action</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <label style="display:block"><span style="font-size:11px;font-weight:600;color:var(--grey)">Description</span><input id="if-desc" style="width:100%;margin-top:4px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:13px" placeholder="What needs to be done?"/></label>
    <label style="display:block"><span style="font-size:11px;font-weight:600;color:var(--grey)">Category</span>
      <select id="if-cat" style="width:100%;margin-top:4px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:13px">
        <option>Process</option><option>Asset Management</option><option>Reporting</option><option>Engineering</option><option>Other</option>
      </select></label>
    <label style="display:block"><span style="font-size:11px;font-weight:600;color:var(--grey)">Owner</span><input id="if-owner" style="width:100%;margin-top:4px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:13px" placeholder="Name"/></label>
    <label style="display:block"><span style="font-size:11px;font-weight:600;color:var(--grey)">Priority</span>
      <select id="if-priority" style="width:100%;margin-top:4px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:13px">
        <option>High</option><option>Medium</option><option>Low</option>
      </select></label>
    <label style="display:block"><span style="font-size:11px;font-weight:600;color:var(--grey)">Status</span>
      <select id="if-status" style="width:100%;margin-top:4px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:13px">
        <option>Open</option><option>In Progress</option><option>Completed</option><option>On Hold</option>
      </select></label>
    <label style="display:block"><span style="font-size:11px;font-weight:600;color:var(--grey)">Target date</span><input id="if-target" type="date" style="width:100%;margin-top:4px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:13px"/></label>
    <label style="display:block"><span style="font-size:11px;font-weight:600;color:var(--grey)">Progress</span><input id="if-progress" style="width:100%;margin-top:4px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:13px" placeholder="What's been done so far?"/></label>
    <label style="display:block"><span style="font-size:11px;font-weight:600;color:var(--grey)">Next steps</span><input id="if-next" style="width:100%;margin-top:4px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:13px" placeholder="What happens next?"/></label>
  </div>
  <div style="display:flex;gap:8px;margin-top:14px">
    <button onclick="saveImpForm()" style="background:var(--p);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer">Save</button>
    <button onclick="document.getElementById('imp-form').style.display='none'" style="background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 16px;font-weight:600;font-size:13px;cursor:pointer">Cancel</button>
  </div>`;
  pg.append(formCard);

  // Table
  const tbl=el("div","card gap"); tbl.id="imp-table";
  renderImpTable(tbl);
  pg.append(tbl);
}

function renderImpTable(container){
  if(!container) container=document.getElementById("imp-table");
  if(!container) return;
  const items=R.improvements||[];
  container.innerHTML=`<div class="card-title">Service improvement action tracker (${items.length} actions)</div>
  <table><thead><tr><th>Action</th><th>Category</th><th>Owner</th><th>Priority</th><th>Status</th><th>Target</th><th>Progress</th><th>Next steps</th><th></th></tr></thead>
  <tbody>${items.map(a=>`<tr>
    <td><b>${a.desc}</b></td>
    <td style="color:var(--grey);font-size:12px">${a.category||""}</td>
    <td>${a.owner||""}</td>
    <td>${pill(a.priority,PC_IMP[a.priority]||BLUE)}</td>
    <td>${pill(a.status,SC_IMP[a.status]||WARN)}</td>
    <td style="font-size:12px">${a.target||"—"}</td>
    <td style="color:var(--grey);font-size:12px">${a.progress||"—"}</td>
    <td style="font-size:12px">${a.next||"—"}</td>
    <td style="white-space:nowrap">
      <button onclick="showImpForm('${a.id}')" style="background:none;border:1px solid #ddd;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;margin-right:4px">Edit</button>
      <button onclick="deleteImp('${a.id}')" style="background:none;border:1px solid #fcc;color:${BAD};border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer">Delete</button>
    </td>
  </tr>`).join("")}</tbody></table>
  ${items.length===0?"<p style='color:#999;padding:12px'>No improvement actions yet. Click '+ Add action' to create one.</p>":""}`;
}

function showImpForm(id){
  editingId=id;
  const form=document.getElementById("imp-form");
  const title=document.getElementById("imp-form-title");
  if(id){
    const a=(R.improvements||[]).find(x=>x.id===id);
    if(!a)return;
    title.textContent="Edit action";
    document.getElementById("if-desc").value=a.desc||"";
    document.getElementById("if-cat").value=a.category||"Process";
    document.getElementById("if-owner").value=a.owner||"";
    document.getElementById("if-priority").value=a.priority||"Medium";
    document.getElementById("if-status").value=a.status||"Open";
    document.getElementById("if-target").value=a.target||"";
    document.getElementById("if-progress").value=a.progress||"";
    document.getElementById("if-next").value=a.next||"";
  } else {
    title.textContent="Add improvement action";
    ["if-desc","if-owner","if-progress","if-next"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("if-priority").value="Medium";
    document.getElementById("if-status").value="Open";
    document.getElementById("if-target").value="";
  }
  form.style.display="block";
  form.scrollIntoView({behavior:"smooth",block:"start"});
}

async function saveImpForm(){
  const data={
    desc:     document.getElementById("if-desc").value.trim(),
    category: document.getElementById("if-cat").value,
    owner:    document.getElementById("if-owner").value.trim(),
    priority: document.getElementById("if-priority").value,
    status:   document.getElementById("if-status").value,
    target:   document.getElementById("if-target").value,
    progress: document.getElementById("if-progress").value.trim(),
    next:     document.getElementById("if-next").value.trim(),
  };
  if(!data.desc){ alert("Please add a description."); return; }
  try {
    if(editingId){
      const res=await fetch(`/api/improvements/${editingId}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
      const updated=await res.json();
      const idx=(R.improvements||[]).findIndex(x=>x.id===editingId);
      if(idx>=0) R.improvements[idx]=updated;
    } else {
      const res=await fetch("/api/improvements",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
      const created=await res.json();
      if(!R.improvements) R.improvements=[];
      R.improvements.push(created);
    }
    document.getElementById("imp-form").style.display="none";
    renderImpTable();
  } catch(e){ alert("Save failed: "+e.message); }
}

async function deleteImp(id){
  if(!confirm("Delete this action?")) return;
  try {
    await fetch(`/api/improvements/${id}`,{method:"DELETE"});
    R.improvements=(R.improvements||[]).filter(x=>x.id!==id);
    renderImpTable();
  } catch(e){ alert("Delete failed: "+e.message); }
}

/* ================================================================
   CHART DRAWING
   ================================================================ */
function drawChartsForPage(id){
  if(!R) return;
  if(id==="summary") drawSummaryCharts();
  if(id==="sla")     drawSLACharts();
  if(id==="cases")   drawCasesCharts();
  if(id==="offices") drawOfficeCharts();
}

function drawSummaryCharts(){
  const L=R.meta.monthsLabels;
  mkChart("cTrend","line",{labels:L,datasets:[
    {label:"Logged",data:R.trendLoggedClosed.map(x=>x.logged),borderColor:P3,backgroundColor:P3+"22",fill:true,tension:.3},
    {label:"Closed",data:R.trendLoggedClosed.map(x=>x.closed),borderColor:BLUE,backgroundColor:BLUE+"22",fill:true,tension:.3},
  ]},{plugins:{title:{display:false}}});

  mkChart("cOpenCat","bar",{labels:FAULTS,datasets:[{data:FAULTS.map(f=>R.openByCategory[f]||0),backgroundColor:FAULTS.map(f=>FC[f])}]},{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}});

  mkChart("cSlaTrend","line",{labels:L,datasets:FAULTS.map(f=>({label:f,data:R.slaTrend.map(x=>x[f]),borderColor:FC[f],tension:.3,spanGaps:true}))},{extra:{plugins:{annotation:{}}}});
}

function drawSLACharts(){
  const L=R.meta.monthsLabels;
  const datasets=FAULTS.map(f=>({label:f,data:R.slaTrend.map(x=>x[f]),borderColor:FC[f],tension:.3,spanGaps:true}));
  // Add dashed target lines as datasets
  FAULTS.forEach(f=>{
    datasets.push({label:f+" target",data:Array(L.length).fill(R.targets[f]),borderColor:FC[f],borderDash:[5,5],borderWidth:1,pointRadius:0,fill:false,tension:0});
  });
  mkChart("cSlaFull","line",{labels:L,datasets},{plugins:{title:{display:false}}});
}

function drawCasesCharts(){
  const L=R.meta.monthsLabels;
  mkChart("cRooms","bar",{labels:(R.topRooms||[]).map(x=>x.name),datasets:[{data:(R.topRooms||[]).map(x=>x.value),backgroundColor:P3}]},{plugins:{legend:{display:false}},scales:{x:{ticks:{maxRotation:30}},y:{beginAtZero:true,ticks:{precision:0}}}});

  mkChart("cRes","doughnut",{labels:(R.byResolution||[]).map(x=>x.name),datasets:[{data:(R.byResolution||[]).map(x=>x.value),backgroundColor:PALETTE}]},{plugins:{legend:{position:"right"}}});

  const topRooms=R.topRoomNames||[];
  mkChart("cRoomTrend","bar",{labels:L,datasets:topRooms.map((r,i)=>({label:r,data:(R.roomTrend||[]).map(x=>x[r]||0),backgroundColor:PALETTE[i%PALETTE.length]}))},{scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,ticks:{precision:0}}}});

  const topRes=R.topResNames||[];
  mkChart("cResTrend","bar",{labels:L,datasets:topRes.map((r,i)=>({label:r,data:(R.resTrend||[]).map(x=>x[r]||0),backgroundColor:PALETTE[i%PALETTE.length]}))},{scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,ticks:{precision:0}}}});

  mkChart("cSC","bar",{labels:L,datasets:[{label:"Service calls",data:(R.serviceCalls?.trend||[]).map(x=>x.visits),backgroundColor:P3}]},{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}});
}

function drawOfficeCharts(){
  const allocs=R.officeAllocations||[];
  mkChart("cOffice","bar",{
    labels:allocs.map(o=>o.office),
    datasets:[
      {label:"Used",data:allocs.map(o=>o.used),backgroundColor:allocs.map(o=>ragCol(o.rag))},
      {label:"Remaining",data:allocs.map(o=>Math.max(0,o.remaining)),backgroundColor:"#e8e8ee"},
    ]},{scales:{x:{stacked:true,ticks:{maxRotation:45}},y:{stacked:true,beginAtZero:true,ticks:{precision:0}}},plugins:{legend:{position:"bottom"}}});
}

/* ── bootstrap */
initNav();
reload();
</script>
